name: Generate .env files

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment: dev | staging | prod'
        required: true
        default: 'dev'
      dry_run:
        description: 'Preview without writing files (true/false)'
        required: false
        default: 'false'
  push:
    paths:
      - '.mdix/env/templates/env.master.mdix'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Get weekly cache key
        id: week
        run: echo "key=$(date -u '+%Y-%U')" >> "$GITHUB_OUTPUT"

      - name: Cache mdix CLI binary
        id: cache-mdix
        uses: actions/cache@v4
        with:
          path: ~/.mdix-bin
          key: mdix-cli-${{ runner.os }}-${{ steps.week.outputs.key }}
          restore-keys: mdix-cli-${{ runner.os }}-

      - name: Build mdix CLI (cache miss only)
        if: steps.cache-mdix.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/Mid-D-Man/DixScript-Rust.git /tmp/dixscript
          cd /tmp/dixscript
          cargo build -p mdix-cli --release
          mkdir -p ~/.mdix-bin
          cp target/release/mdix ~/.mdix-bin/mdix

      - name: Install mdix to PATH
        run: |
          sudo cp ~/.mdix-bin/mdix /usr/local/bin/mdix
          echo "mdix version: $(mdix --version)"

      - name: Validate master template
        run: mdix validate .mdix/env/templates/env.master.mdix

      - name: Decrypt secrets (if enc file exists)
        env:
          MDIX_DLM_PASSWORD: ${{ secrets.MDIX_ENV_PASSWORD }}
        run: |
          ENC_FILE=".mdix/env/templates/env.secrets.mdix.enc"
          if [ -f "$ENC_FILE" ]; then
            echo "Decrypting secrets..."
            mdix decrypt "$ENC_FILE" \
              --password "$MDIX_DLM_PASSWORD" \
              -o /tmp/secrets_out/
            mdix convert /tmp/secrets_out/env.secrets.mdix \
              --to json -o /tmp/secrets.json
            echo "Secrets decrypted."
          else
            echo "No secrets file found — skipping."
            echo "{}" > /tmp/secrets.json
          fi

      - name: Generate .env file
        env:
          TARGET_ENV:      ${{ inputs.environment || 'dev' }}
          DRY_RUN:         ${{ inputs.dry_run || 'false' }}
          MASTER_TEMPLATE: .mdix/env/templates/env.master.mdix
          SECRETS_JSON:    /tmp/secrets.json
          OUTPUT_DIR:      output
        run: python3 scripts/generate_env.py

      - name: Show output directory
        if: ${{ inputs.dry_run != 'true' }}
        run: ls -la output/ 2>/dev/null || echo "(empty)"

      - name: Commit generated .env files
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet \
            && echo "Nothing changed." \
            || git commit -m "chore: regenerate .env.${{ inputs.environment || 'dev' }} [skip ci]"
          git push
